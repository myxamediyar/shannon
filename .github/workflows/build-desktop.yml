name: build-desktop

# Manual cloud builder for Windows / Linux Tauri bundles. macOS builds
# are produced locally on a Mac with the Developer ID cert installed.
#
# Trigger from GitHub Actions tab → "Run workflow". Artifacts are
# downloadable from the run page once both jobs finish (~8 min).

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, target: x86_64-pc-windows-msvc,    label: windows-x64 }
          - { os: ubuntu-22.04,   target: x86_64-unknown-linux-gnu,  label: linux-x64   }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            patchelf

      - run: npm ci

      # tauri.conf.json's beforeBuildCommand already runs the SPA build,
      # so we just call tauri:build with the target. The `--` forwards the
      # flag to tauri-cli through the workspace runner.
      #
      # TAURI_SIGNING_PRIVATE_KEY + password are required by
      # createUpdaterArtifacts: true in tauri.conf.json. Without them the
      # build fails with "no signing private key set". They produce
      # platform-specific updater bundles (.nsis.zip / .AppImage.tar.gz)
      # plus matching .sig files which feed latest.json.
      - run: npm run tauri:build -- --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # Tauri 2 signs the actual installers directly (.exe.sig, .AppImage.sig,
      # .msi.sig, .deb.sig). The older Tauri 1 ".nsis.zip.sig" / ".AppImage.tar.gz.sig"
      # naming is gone — don't be misled by stale community docs.
      - uses: actions/upload-artifact@v4
        with:
          name: shannon-${{ matrix.label }}
          if-no-files-found: error
          path: |
            packages/shannon-desktop/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            packages/shannon-desktop/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi.sig
            packages/shannon-desktop/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            packages/shannon-desktop/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe.sig
            packages/shannon-desktop/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            packages/shannon-desktop/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb.sig
            packages/shannon-desktop/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            packages/shannon-desktop/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.sig
